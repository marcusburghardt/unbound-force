version: 2

builds:
  - id: unbound
    main: ./cmd/unbound
    binary: unbound
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Tag}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
  - id: mxf
    main: ./cmd/mxf
    binary: mxf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Tag}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      unbound_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
    - title: Others
      order: 999
  filters:
    exclude:
      - '^chore:'

homebrew_casks:
  - name: unbound
    description: "Unbound Force specification framework toolkit"
    homepage: "https://github.com/unbound-force/unbound-force"
    directory: Casks
    # skip_upload: true — GoReleaser generates the cask to dist/ but does not
    # push to the tap. The sign-macos job downloads it, patches darwin checksums
    # with signed values, then pushes the complete cask to homebrew-tap.
    skip_upload: true
    dependencies:
      - cask: graphthulhu
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/unbound"]
          end
    repository:
      owner: unbound-force
      name: homebrew-tap
